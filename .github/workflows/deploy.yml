name: Deploy Power Platform Solution

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      solution_package_type:
        description: Solution package type to build and import
        required: true
        default: Managed
        type: choice
        options:
          - Managed
          - Unmanaged

env:
  SOLUTION_NAME: CampanulaPlannerFlows
  SOLUTION_UNIQUE_NAME: CampanulaPlannerFlows
  SOLUTION_FOLDER: src/CampanulaPlannerFlows
  SOLUTION_ZIP: out/CampanulaPlannerFlows.zip
  SOLUTION_PACKAGE_TYPE: ${{ github.event_name == 'push' && 'Unmanaged' || inputs.solution_package_type }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Pack & Import Solution
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags and releases
      issues: write # comment on released issues
      pull-requests: write # comment on merged PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # semantic-release needs full history

      - name: Determine release version
        id: semanticRelease
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 25 # pin to match package.json ^25.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Power Platform CLI
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Set solution version
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        run: |
          VER="${{ steps.semanticRelease.outputs.new_release_version }}.0"
          sed -i "s|<Version>.*</Version>|<Version>${VER}</Version>|" \
            "${{ env.SOLUTION_FOLDER }}/Other/Solution.xml"
          echo "Solution version: ${VER}"

      - name: Authenticate with Power Platform
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        run: |
          "$POWERPLATFORMTOOLS_PACPATH" auth create \
            --environment   "${{ vars.PP_ENVIRONMENT_URL }}" \
            --applicationId "${{ vars.PP_APP_ID }}" \
            --clientSecret  "${{ secrets.PP_CLIENT_SECRET }}" \
            --tenant        "${{ vars.PP_TENANT_ID }}"

      - name: Check existing solution entries
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        run: |
          echo "Requested package type: ${{ env.SOLUTION_PACKAGE_TYPE }}"
          if "$POWERPLATFORMTOOLS_PACPATH" solution list --environment "${{ vars.PP_ENVIRONMENT_URL }}" | grep -qiw "${{ env.SOLUTION_UNIQUE_NAME }}"; then
            echo "Found an existing solution entry matching ${{ env.SOLUTION_UNIQUE_NAME }}."
            if [ "${{ env.SOLUTION_PACKAGE_TYPE }}" = "Managed" ]; then
              echo "::warning title=Managed import requires a clean target environment::If the matching solution is unmanaged, Power Platform will reject a managed import. Remove the unmanaged solution first or rerun the workflow with solution_package_type=Unmanaged."
            fi
          else
            echo "No existing solution entry matching ${{ env.SOLUTION_UNIQUE_NAME }} was found."
          fi

      - name: Create solution zip
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        run: |
          mkdir -p out
          "$POWERPLATFORMTOOLS_PACPATH" solution pack \
            --zipFile "${{ env.SOLUTION_ZIP }}" \
            --folder "${{ env.SOLUTION_FOLDER }}" \
            --packageType "${{ env.SOLUTION_PACKAGE_TYPE }}"

      - name: Upload packed solution as artifact
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.SOLUTION_NAME }}
          path: ${{ env.SOLUTION_ZIP }}
          retention-days: 30

      - name: Attach solution zip to GitHub release
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semanticRelease.outputs.new_release_git_tag }}
          files: ${{ env.SOLUTION_ZIP }}

      - name: Import solution to Power Platform
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ vars.PP_ENVIRONMENT_URL }}
          app-id: ${{ vars.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ vars.PP_TENANT_ID }}
          solution-file: ${{ env.SOLUTION_ZIP }}
          force-overwrite: true
          publish-changes: true
