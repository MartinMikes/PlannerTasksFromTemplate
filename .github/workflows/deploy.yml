name: Deploy Power Platform Solution

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for ad hoc production deployment
        required: true
        type: string

concurrency:
  group: power-platform-production
  cancel-in-progress: false

env:
  SOLUTION_NAME: CampanulaPlannerFlows
  SOLUTION_FOLDER: src/CampanulaPlannerFlows
  SOLUTION_ZIP: out/CampanulaPlannerFlows.zip
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Pack & Import Solution
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags and releases
      issues: write # comment on released issues
      pull-requests: write # comment on merged PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # semantic-release needs full history

      - name: Determine release version
        if: github.event_name == 'push'
        id: semanticRelease
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 25 # pin to match package.json ^25.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip deploy when there is no release
        if: github.event_name == 'push' && steps.semanticRelease.outputs.new_release_published != 'true'
        run: echo "semantic-release did not publish a release, so automatic deployment is skipped."

      - name: Show ad hoc deploy reason
        if: github.event_name == 'workflow_dispatch'
        env:
          DEPLOY_REASON: ${{ inputs.reason }}
        run: |
          echo "Ad hoc production deployment requested by ${{ github.actor }}."
          stop_marker="$(uuidgen)"
          echo "::stop-commands::${stop_marker}"
          echo "Reason: ${DEPLOY_REASON}"
          echo "::${stop_marker}::"

      - name: Install Power Platform CLI
        if: github.event_name == 'workflow_dispatch' || steps.semanticRelease.outputs.new_release_published == 'true'
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Set solution version
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        run: |
          VER="${{ steps.semanticRelease.outputs.new_release_version }}.0"
          sed -i "s|<Version>.*</Version>|<Version>${VER}</Version>|" \
            "${{ env.SOLUTION_FOLDER }}/Other/Solution.xml"
          echo "Solution version: ${VER}"

      - name: Commit updated solution version
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        run: |
          VER="${{ steps.semanticRelease.outputs.new_release_version }}.0"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.SOLUTION_FOLDER }}/Other/Solution.xml"
          git commit -m "chore: update solution version to ${VER} [skip ci]"
          git push

      - name: Authenticate with Power Platform
        if: github.event_name == 'workflow_dispatch' || steps.semanticRelease.outputs.new_release_published == 'true'
        run: |
          "$POWERPLATFORMTOOLS_PACPATH" auth create \
            --environment   "${{ vars.PP_ENVIRONMENT_URL }}" \
            --applicationId "${{ vars.PP_APP_ID }}" \
            --clientSecret  "${{ secrets.PP_CLIENT_SECRET }}" \
            --tenant        "${{ vars.PP_TENANT_ID }}"

      - name: Create solution zip
        if: github.event_name == 'workflow_dispatch' || steps.semanticRelease.outputs.new_release_published == 'true'
        run: |
          mkdir -p out
          "$POWERPLATFORMTOOLS_PACPATH" solution pack \
            --zipFile "${{ env.SOLUTION_ZIP }}" \
            --folder "${{ env.SOLUTION_FOLDER }}" \
            --packageType Managed

      - name: Upload packed solution as artifact
        if: github.event_name == 'workflow_dispatch' || steps.semanticRelease.outputs.new_release_published == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.SOLUTION_NAME }}
          path: ${{ env.SOLUTION_ZIP }}
          retention-days: 30

      - name: Attach solution zip to GitHub release
        if: steps.semanticRelease.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semanticRelease.outputs.new_release_git_tag }}
          files: ${{ env.SOLUTION_ZIP }}

      - name: Import solution to Power Platform
        if: github.event_name == 'workflow_dispatch' || steps.semanticRelease.outputs.new_release_published == 'true'
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ vars.PP_ENVIRONMENT_URL }}
          app-id: ${{ vars.PP_APP_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ vars.PP_TENANT_ID }}
          solution-file: ${{ env.SOLUTION_ZIP }}
          force-overwrite: true
          publish-changes: true
